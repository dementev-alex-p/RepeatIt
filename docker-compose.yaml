networks:
  app-network:
    name: repeat_it_network
    driver: bridge

volumes:
  postgres_data:
    name: repeat_it_volume

services:
  postgres:
    image: postgres:13
    container_name: repeat_it_postgres
    environment:
      POSTGRES_DB: repeat_it_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repeat_it_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
  app:
    image: dementevalexp/repeat_it_bot
    container_name: repeat-it-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Moscow
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/repeat_it_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
    depends_on:
      - postgres
    networks:
      - app-network

